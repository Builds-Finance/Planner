<!DOCTYPE html>
<html>
<head>
  <title>Futures Trade Setup</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; max-width: 1000px; }
    td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }

    .input { background-color: #b3e5fc; }
    .formula { background-color: #fff59d; }
    .output { background-color: #c8e6c9; }

    input {
      width: 100%;
      border: none;
      padding: 5px;
      text-align: center;
      background: transparent;
    }

    input:focus {
      outline: none;
      background: #e1f5fe;
    }
  </style>
</head>

<body>

<h2>Futures Trade Setup</h2>

<table>
<tr>
  <th>Lot Size</th>
  <th>RSI Profit %</th>
  <th>First Avg %</th>
  <th>First Avg</th>
  <th>Entry</th>
  <th>Avg Price</th>
  <th>RSI Target</th>
  <th>Take Away Profit</th>
  <th>First Avg Diff</th>
  <th>Target Diff</th>
</tr>

<tr>
  <!-- Inputs -->
  <td class="input">
    <input id="lot" placeholder="Lot Size" oninput="calc()">
  </td>

  <!-- Formula cells -->
  <td class="formula" id="rsiProfit"></td>
  <td class="formula" id="firstAvgPercent"></td>
  <td class="formula" id="firstAvg"></td>

  <!-- Entry now input -->
  <td class="input">
    <input id="entry" placeholder="Entry Price" oninput="calc()">
  </td>

  <td class="formula" id="avgPrice"></td>
  <td class="formula" id="rsiTarget"></td>
  <td class="formula" id="takeProfit"></td>

  <!-- Outputs -->
  <td class="output" id="avgDiff"></td>
  <td class="output" id="targetDiff"></td>
</tr>

</table>

<script>
function calc() {

  let B = Number(document.getElementById("lot").value);     // Lot Size
  let F = Number(document.getElementById("entry").value);   // Entry

  if (!B || !F) return;

  // ===== Excel Formula Conversion =====

  // First Avg %
  let D = -4000 / (F * B);

  // First Avg
  let E = (F * D) + F;

  // Avg Price
  let G = (E + F) / 2;

  // RSI Profit %
  let C = 3000 / (G * B);

  // RSI Target
  let H = (G * C) + G;

  // Take Away Profit
  let I = (H - F) * B;

  // First Avg Diff
  let J = E - F;

  // Target Diff
  let K = H - G;

  // ===== Display =====

  document.getElementById("rsiProfit").innerText = C.toFixed(4);
  document.getElementById("firstAvgPercent").innerText = D.toFixed(4);
  document.getElementById("firstAvg").innerText = E.toFixed(2);
  document.getElementById("avgPrice").innerText = G.toFixed(2);
  document.getElementById("rsiTarget").innerText = H.toFixed(2);
  document.getElementById("takeProfit").innerText = I.toFixed(2);
  document.getElementById("avgDiff").innerText = J.toFixed(2);
  document.getElementById("targetDiff").innerText = K.toFixed(2);
}
</script>

</body>
</html>
