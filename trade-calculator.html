<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Trade Calculator | Kunal Finance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Core styles -->
    <link rel="stylesheet" href="common.css">

    <!-- Page styles -->
    <link rel="stylesheet" href="trade-calculator.css">
</head>

<body>

<header>
    <a href="index.html" class="logo">📊 Kunal Finance</a>
</header>

<main>
<div class="scroll-area">

<section class="calculator-wrapper">

<div class="calculator-card">

<h1>📈 Trade Decision Output</h1>
<p class="subtitle">
    Enter inputs → See only final decision metrics
</p>

<h2>Input</h2>

<div class="input-grid">

    <div class="input-group">
        <label>Lot Size</label>
        <input type="number" id="lot" placeholder="Enter lot size" oninput="calc()">
    </div>

    <div class="input-group">
        <label>Entry Price</label>
        <input type="number" id="entry" placeholder="Enter entry price" oninput="calc()">
    </div>

</div>

<h2>Final Output</h2>

<div class="output-box">

    <div class="output-item">
        <span>First Avg Diff</span>
        <strong id="avgDiff">-</strong>
    </div>

    <div class="output-item">
        <span>Target Diff</span>
        <strong id="targetDiff">-</strong>
    </div>

</div>

<p class="calculator-note">
    Focus only on decision variables. Ignore noise.
</p>

</div>

</section>

</div>
</main>

<footer>
    © 2025 Kunal Finance
</footer>

<script>
function calc() {

    let B = Number(document.getElementById("lot").value);
    let F = Number(document.getElementById("entry").value);

    if (!B || !F) return;

    // Excel logic (exact)
    let D = 4000 / (F * B);
    let E = (F * D) + F;
    let G = (E + F) / 2;
    let C = 3000 / (G * B);
    let H = (G * C) + G;
    let I = (H - F) * B;

    let J = E - F;   // First Avg Diff
    let K = H - G;   // Target Diff

    document.getElementById("avgDiff").innerText = J.toFixed(2);
    document.getElementById("targetDiff").innerText = K.toFixed(2);
}
</script>

</body>
</html>
